name: Build & Release APK

on:
  push:
    branches:
      - main # Jalan setiap kali ada push biasa ke branch main
    tags:
      - 'v*' # Jalan saat Anda push tag rilis versi seperti v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      # 1. Selalu simpan APK sebagai Artifact (Bisa diunduh dari halaman Actions untuk push biasa)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seporsi-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 2. Buat Release di GitHub (Hanya dijalankan jika pemicunya adalah tag versi v*)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
