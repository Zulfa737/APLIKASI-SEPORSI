<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SEPORSI - Aplikasi E-Bisnis Makanan Premium">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SEPORSI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>SEPORSI</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F9F9F9;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #F9F9F9;
      z-index: 99999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Logo Bowl Styling */
    .logo-wrapper {
      position: relative;
      width: 88px;
      height: 64px;
      margin-bottom: 16px;
    }
    /* Maroon Semicircle Bowl (bottom part) */
    .logo-bowl {
      position: absolute;
      top: 20px;
      left: 0;
      width: 88px;
      height: 44px;
      background-color: #8D3030;
      border-bottom-left-radius: 44px;
      border-bottom-right-radius: 44px;
    }
    /* Small circle - Top half (Maroon, above the bowl) */
    .logo-top {
      position: absolute;
      top: 0;
      left: 24px;
      width: 40px;
      height: 20px;
      background-color: #8D3030;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
    /* Small circle - Bottom half (F9F9F9, cutout inside the bowl) */
    .logo-cutout {
      position: absolute;
      top: 20px;
      left: 24px;
      width: 40px;
      height: 20px;
      background-color: #F9F9F9;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 900;
      color: #8D3030;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }
    /* Modern minimalist spinner */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #EAEAEA;
      border-top: 3px solid #8D3030;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- SEPORSI Custom Splash Loader -->
  <div id="loading-indicator">
    <div class="loading-container">
      <div class="logo-wrapper">
        <div class="logo-bowl"></div>
        <div class="logo-top"></div>
        <div class="logo-cutout"></div>
      </div>
      <div class="logo-text">SEPORSI</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
